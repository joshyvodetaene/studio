name: Torro Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Static Next.js Build
        run: npm run static-build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build APK
        run: |
          npx cap add android || true
          npx cap sync android
          
          # AUTOMATISIERUNG: Native VPN-Service Injection
          PACKAGE_PATH="android/app/src/main/java/com/torro/pro"
          mkdir -p $PACKAGE_PATH
          cat > $PACKAGE_PATH/MyVpnService.java <<EOF
          package com.torro.pro;
          import android.net.VpnService;
          import android.content.Intent;
          public class MyVpnService extends VpnService {
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  return START_STICKY;
              }
          }
          EOF
          
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "MyVpnService" "$MANIFEST"; then
            sed -i '/<\/activity>/a \
            <service android:name=".MyVpnService" android:permission="android.permission.BIND_VPN_SERVICE" android:exported="false"><intent-filter><action android:name="android.net.VpnService"\/><\/intent-filter><\/service>' "$MANIFEST"
          fi

          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Torro Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
