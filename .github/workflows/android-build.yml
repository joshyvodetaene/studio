name: Torro Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Static Next.js Build
        run: npm run static-build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android APK
        run: |
          npx cap add android || true
          npx cap sync android
          
          # AUTOMATISIERUNG: Native VPN-Service Injection
          echo "Injecting Native VpnService..."
          PACKAGE_PATH="android/app/src/main/java/com/torro/pro"
          mkdir -p $PACKAGE_PATH
          
          cat > $PACKAGE_PATH/MyVpnService.java <<EOF
          package com.torro.pro;
          import android.net.VpnService;
          import android.content.Intent;
          import android.os.ParcelFileDescriptor;

          public class MyVpnService extends VpnService {
              private ParcelFileDescriptor vpnInterface = null;
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  return START_STICKY;
              }
              @Override
              public void onDestroy() {
                  if (vpnInterface != null) {
                      try { vpnInterface.close(); } catch (Exception e) {}
                      vpnInterface = null;
                  }
                  super.onDestroy();
              }
          }
          EOF

          # Manifest Update
          MANIFEST="android/app/src/main/main/AndroidManifest.xml"
          # Check if service already exists to avoid duplicates
          if ! grep -q "MyVpnService" android/app/src/main/AndroidManifest.xml; then
            sed -i '/<\/activity>/a \
            <service android:name=".MyVpnService" android:permission="android.permission.BIND_VPN_SERVICE" android:exported="false"><intent-filter><action android:name="android.net.VpnService"\/><\/intent-filter><\/service>' android:app/src/main/AndroidManifest.xml
          fi

          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: torro-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
